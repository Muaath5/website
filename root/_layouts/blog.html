---
layout: base
---
<div class="site-wrapper">
    <nav class="site-nav">
        <div class="nav-inner">
            <a class="nav-brand" href="/blog">
                <span class="brand-dot"></span>
                Muaath Blog
            </a>
            <div class="nav-links">
                <a class="nav-link" href="/blog/tags">
                    <i class="bi-tags"></i>
                    Tags
                </a>
            </div>
        </div>
    </nav>

    <main class="site-main">
        <div class="container">
            {{ content }}
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-social">
                {% for soc in site.data.social %}
                <a href="{{ soc[1].url }}" aria-label="{{ soc[0] }}"><i class="bi-{{ soc[1].icon }}"></i></a>
                {% endfor %}
            </div>
            <div class="footer-meta">
                {{ site.data[page.lang].footer }}
            </div>
        </div>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
    
            // Select all close buttons inside elements with the 'alert' class
            const closeButtons = document.querySelectorAll('.btn-close');
            console.log(closeButtons);
            closeButtons.forEach(button => {
            button.addEventListener('click', function() {
                // Find the parent alert div
                const alertBox = this.closest('.alert');
                console.log("Removed ann");
                // Step 1: Fade out the alert
                alertBox.style.opacity = '0';
                
                // Step 2: Wait for the CSS transition to finish, then remove from DOM
                setTimeout(() => {
                alertBox.remove();
                }, 300); // 300ms matches the CSS transition duration
            });
            });
            
        });
    </script>
</div>
